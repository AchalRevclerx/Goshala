<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - श्री प्रेमानंद गोशाला</title>
    <link rel="icon" type="image/png" href="icon/favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.5.3/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bree+Serif&family=Acme&display=swap">
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
    <link rel="stylesheet" href="css/shared.css">
    <style>
        .page-hero{background:linear-gradient(rgba(139,69,19,0.85),rgba(139,69,19,0.85)),url('images/IMG-20260708-WA0006.jpg');}
        .gallery-page-section{padding:60px 0;}
        .gallery-page-section .head_item3{width:100%;text-align:center;margin:0 0 40px;display:flex;align-items:center;justify-content:center;}
        .gallery-page-section .head_item3 span{background:var(--background-color);color:#fff;padding:12px 40px;border-radius:8px;font-size:24px;font-weight:bold;display:inline-block;text-transform:uppercase;box-shadow:0 4px 15px rgba(139,69,19,0.3);}
        .gallery-grid-page{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:15px;}
        .gallery-grid-page .gallery-item-page{position:relative;border-radius:12px;overflow:hidden;box-shadow:0 4px 15px rgba(0,0,0,0.1);cursor:pointer;aspect-ratio:4/3;}
        .gallery-grid-page .gallery-item-page img{width:100%;height:100%;object-fit:cover;transition:transform 0.3s;}
        .gallery-grid-page .gallery-item-page:hover img{transform:scale(1.1);}
        .gallery-grid-page .gallery-item-page .gallery-overlay{position:absolute;inset:0;background:rgba(139,69,19,0.7);display:flex;align-items:center;justify-content:center;opacity:0;transition:0.3s;}
        .gallery-grid-page .gallery-item-page:hover .gallery-overlay{opacity:1;}
        .gallery-grid-page .gallery-item-page .gallery-overlay i{color:#fff;font-size:30px;}
        .lightbox-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.9);display:none;align-items:center;justify-content:center;z-index:9999;}
        .lightbox-overlay.active{display:flex;}
        .lightbox-overlay img{max-width:90%;max-height:90vh;border-radius:8px;}
        .lightbox-overlay .lightbox-close{position:absolute;top:20px;right:30px;color:#fff;font-size:36px;cursor:pointer;z-index:10000;}
        .lightbox-overlay .lightbox-nav{position:absolute;top:50%;transform:translateY(-50%);color:#fff;font-size:40px;cursor:pointer;padding:15px;z-index:10000;}
        .lightbox-overlay .lightbox-nav.prev{left:20px;}
        .lightbox-overlay .lightbox-nav.next{right:20px;}
        @media only screen and (max-width:768px){
            .gallery-page-section .head_item3 span{font-size:18px;padding:10px 25px;}
            .gallery-grid-page{grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;}
        }
    </style>
</head>
<body>

    <div id="main-content">
        <section class="page-hero">
            <div class="container">
                <h1><i class="fa fa-camera"></i> Gallery</h1>
                <p>Moments from Our Gaushala</p>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="index.html"><i class="fa fa-home"></i> Home</a></li>
                        <li class="breadcrumb-item active" aria-current="page">Gallery</li>
                    </ol>
                </nav>
            </div>
        </section>

        <section class="gallery-page-section">
            <div class="container">
                <div class="head_item3" data-aos="fade-down">
                    <span><i class="fa fa-camera"></i> Photo Gallery</span>
                </div>
                <div class="gallery-grid-page" id="galleryGridPage">
                </div>
            </div>
        </section>

        <div class="lightbox-overlay" id="lightbox">
            <span class="lightbox-close" id="lightboxClose"><i class="fa fa-times"></i></span>
            <span class="lightbox-nav prev" id="lightboxPrev"><i class="fa fa-chevron-left"></i></span>
            <img id="lightboxImg" src="" alt="Gallery Image">
            <span class="lightbox-nav next" id="lightboxNext"><i class="fa fa-chevron-right"></i></span>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.5.3/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/app.js"></script>
    <script src="js/shared.js"></script>
    <script>
        var galleryImages = [];
        var currentLightboxIndex = 0;

        function loadGallery() {
            $.get('/api/gallery', function(data) {
                galleryImages = data || [];
                var grid = $('#galleryGridPage');
                grid.empty();
                if (galleryImages.length === 0) {
                    grid.html('<p class="text-center" style="grid-column:1/-1;color:#888;">No images available.</p>');
                    return;
                }
                galleryImages.forEach(function(img, i) {
                    var item = '<div class="gallery-item-page" data-index="' + i + '" data-aos="fade-up" data-aos-delay="' + (i % 4) * 100 + '">' +
                        '<img src="/uploads/' + img.image + '" alt="' + (img.title || 'Gallery Image') + '">' +
                        '<div class="gallery-overlay"><i class="fa fa-expand"></i></div>' +
                        '</div>';
                    grid.append(item);
                });
            }).fail(function() {
                $('#galleryGridPage').html('<p class="text-center" style="grid-column:1/-1;color:#888;">Failed to load gallery.</p>');
            });
        }

        function openLightbox(index) {
            currentLightboxIndex = index;
            $('#lightboxImg').attr('src', '/uploads/' + galleryImages[index].image);
            $('#lightbox').addClass('active');
            $('body').css('overflow', 'hidden');
        }

        function closeLightbox() {
            $('#lightbox').removeClass('active');
            $('body').css('overflow', '');
        }

        function navigateLightbox(dir) {
            currentLightboxIndex = (currentLightboxIndex + dir + galleryImages.length) % galleryImages.length;
            $('#lightboxImg').attr('src', '/uploads/' + galleryImages[currentLightboxIndex].image);
        }

        $(document).on('click', '.gallery-item-page', function() {
            openLightbox(parseInt($(this).data('index')));
        });

        $('#lightboxClose').on('click', closeLightbox);
        $('#lightboxPrev').on('click', function() { navigateLightbox(-1); });
        $('#lightboxNext').on('click', function() { navigateLightbox(1); });
        $('#lightbox').on('click', function(e) { if (e.target === this) closeLightbox(); });
        $(document).on('keydown', function(e) {
            if (!$('#lightbox').hasClass('active')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft') navigateLightbox(-1);
            if (e.key === 'ArrowRight') navigateLightbox(1);
        });

        loadGallery();
    </script>
</body>
</html>
