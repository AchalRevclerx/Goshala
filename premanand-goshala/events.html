<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upcoming Events - श्री प्रेमानंद गौशाला</title>
    <link rel="icon" type="image/png" href="icon/favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.5.3/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bree+Serif&family=Acme&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.carousel.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.theme.default.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
    <link rel="stylesheet" href="css/shared.css">
    <style>
        .events-section { padding:60px 0; }
        .events-section .head_item3 { width:100%; text-align:center; margin:0 0 40px; display:flex; align-items:center; justify-content:center; }
        .events-section .head_item3 span { background:var(--background-color); color:#fff; padding:12px 40px; border-radius:8px; font-size:24px; font-weight:bold; display:inline-block; text-transform:uppercase; box-shadow:0 4px 15px rgba(139,69,19,0.3); }
        .event-card { background:#fff; border-radius:12px; overflow:hidden; box-shadow:0 4px 20px rgba(0,0,0,0.08); margin-bottom:30px; transition:0.3s; }
        .event-card:hover { transform:translateY(-5px); box-shadow:0 8px 30px rgba(139,69,19,0.15); }
        .event-card .event-img { height:200px; object-fit:cover; width:100%; }
        .event-card .event-body { padding:20px; }
        .event-card .event-date-badge { background:var(--gold); color:#fff; display:inline-block; padding:5px 15px; border-radius:50px; font-size:13px; margin-bottom:10px; }
        .event-card h5 { color:var(--background-color); font-family:'Acme',sans-serif; margin-bottom:10px; }
        .event-card p { color:#666; font-size:14px; line-height:1.7; margin-bottom:10px; }
        .event-card .event-meta { font-size:13px; color:#999; }
        .event-card .event-meta i { margin-right:5px; color:var(--gold); }
        .no-events { text-align:center; padding:60px 20px; background:#fff; border-radius:12px; box-shadow:0 4px 20px rgba(0,0,0,0.08); }
        .no-events i { font-size:60px; color:#ddd; margin-bottom:15px; }
        .no-events h4 { color:#999; }
        @media only screen and (max-width:768px) { .events-section .head_item3 span { font-size:18px; padding:10px 25px; } }
    </style>
</head>
<body>
    <div id="main-content">
        <section class="page-hero">
            <div class="container">
                <h1><i class="fa fa-calendar"></i> Upcoming Events</h1>
                <p>Stay updated with श्री प्रेमानंद गोशाला events and programs</p>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="index.html"><i class="fa fa-home"></i> Home</a></li>
                        <li class="breadcrumb-item active" aria-current="page">Upcoming Events</li>
                    </ol>
                </nav>
            </div>
        </section>
        <section class="events-section">
            <div class="container">
                <div class="head_item3" data-aos="fade-down"><span><i class="fa fa-calendar"></i> Upcoming Events</span></div>
                <div class="row" id="eventsContainer">
                    <div class="col-12 text-center py-5"><i class="fa fa-spinner fa-spin fa-3x" style="color:var(--gold);"></i><p class="mt-3">Loading events...</p></div>
                </div>
            </div>
        </section>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.5.3/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/owl.carousel.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/app.js"></script>
    <script src="js/shared.js"></script>
    <script>
        $(function() { loadEvents(); });
        function loadEvents() {
            var container = $('#eventsContainer');
            container.html('<div class="col-12 text-center py-5"><i class="fa fa-spinner fa-spin fa-3x" style="color:var(--gold);"></i><p class="mt-3">Loading events...</p></div>');
            $.ajax({
                url: '/api/events',
                method: 'GET',
                dataType: 'json',
                success: function(events) {
                    container.empty();
                    if (!events || !Array.isArray(events) || events.length === 0) {
                        container.html('<div class="col-12"><div class="no-events"><i class="fa fa-calendar-times-o"></i><h4>No upcoming events</h4><p style="color:#999;">Check back later for new events and programs.</p></div></div>');
                        return;
                    }
                    events.forEach(function(ev) {
                        var imgHtml = ev.image ? '<img src="/uploads/' + ev.image + '" class="event-img" alt="' + (ev.title || '') + '">' : '';
                        var dateHtml = ev.date ? '<span class="event-date-badge"><i class="fa fa-calendar"></i> ' + ev.date + '</span>' : '';
                        var timeHtml = ev.time ? '<span class="event-meta ml-3"><i class="fa fa-clock-o"></i> ' + ev.time + '</span>' : '';
                        var locHtml = ev.location ? '<span class="event-meta ml-3"><i class="fa fa-map-marker"></i> ' + ev.location + '</span>' : '';
                        var descHtml = ev.description ? '<p>' + ev.description + '</p>' : '';
                        container.append('<div class="col-lg-4 col-md-6">' +
                            '<div class="event-card">' + imgHtml +
                            '<div class="event-body">' + dateHtml + timeHtml +
                            '<h5>' + (ev.title || '') + '</h5>' + descHtml + locHtml +
                            '</div></div></div>');
                    });
                    try { AOS.refresh(); } catch(e) {}
                },
                error: function(xhr, status, err) {
                    container.html('<div class="col-12"><div class="no-events"><i class="fa fa-exclamation-triangle" style="color:var(--gold);"></i><h4>Could not load events</h4><p style="color:#999;">Error: ' + (err || status) + '</p></div></div>');
                }
            });
        }
    </script>
</body>
</html>
