<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Member - श्री प्रेमानंद गोशाला</title>
    <link rel="icon" type="image/png" href="icon/favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.5.3/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bree+Serif&family=Acme&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.carousel.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.theme.default.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
    <link rel="stylesheet" href="css/shared.css">
    <style>
        .staff-section { padding:60px 0; }
        .staff-section .head_item3 { width:100%; text-align:center; margin:0 0 40px; display:flex; align-items:center; justify-content:center; }
        .staff-section .head_item3 span { background:var(--background-color); color:#fff; padding:12px 40px; border-radius:8px; font-size:24px; font-weight:bold; display:inline-block; text-transform:uppercase; box-shadow:0 4px 15px rgba(139,69,19,0.3); }
        .member-status { display:inline-block; padding:3px 10px; border-radius:12px; font-size:12px; font-weight:600; margin-bottom:6px; }
        .member-status.approved { background:#d4edda; color:#155724; }
        .member-status.pending { background:#fff3cd; color:#856404; }
        .member-status.rejected { background:#f8d7da; color:#721c24; }
        .validity-text { font-size:12px; color:#999; }
        .search-card { background:#fff; border-radius:12px; padding:30px; box-shadow:0 4px 20px rgba(0,0,0,0.08); margin-bottom:30px; }
        .search-card h4 { color:var(--background-color); font-family:'Acme',sans-serif; margin-bottom:20px; border-bottom:2px solid var(--gold); padding-bottom:10px; }
        .search-modes { display:flex; gap:0; margin-bottom:20px; border:2px solid var(--background-color); border-radius:8px; overflow:hidden; }
        .search-modes .mode-btn { flex:1; padding:10px; text-align:center; cursor:pointer; transition:0.3s; font-weight:600; font-size:14px; background:#fff; color:var(--background-color); border:none; font-family:'Bree Serif',serif; }
        .search-modes .mode-btn:first-child { border-right:1px solid var(--background-color); }
        .search-modes .mode-btn.active { background:var(--background-color); color:#fff; }
        .search-modes .mode-btn:hover:not(.active) { background:var(--light-bg); }
        .search-input-group { display:flex; gap:10px; }
        .search-input-group .form-control { border-radius:8px; border:1px solid #ddd; padding:12px 15px; font-size:15px; font-family:'Bree Serif',serif; }
        .search-input-group .form-control:focus { border-color:var(--gold); box-shadow:0 0 0 0.2rem rgba(212,160,23,0.25); }
        .search-btn { background:var(--green); color:#fff; border:none; padding:12px 30px; border-radius:8px; font-size:15px; font-weight:600; cursor:pointer; transition:0.3s; font-family:'Bree Serif',serif; white-space:nowrap; }
        .search-btn:hover { background:var(--background-color); }
        .results-count { font-size:14px; color:#666; margin-bottom:20px; }
        .results-count strong { color:var(--background-color); }
        .staff-card { background:#fff; border-radius:12px; overflow:hidden; box-shadow:0 4px 20px rgba(0,0,0,0.08); margin-bottom:20px; transition:0.3s; display:flex; align-items:center; padding:20px; gap:20px; }
        .staff-card:hover { transform:translateY(-3px); box-shadow:0 8px 30px rgba(139,69,19,0.15); }
        .staff-avatar { width:80px; height:80px; border-radius:50%; overflow:hidden; flex-shrink:0; background:var(--light-bg); display:flex; align-items:center; justify-content:center; border:3px solid var(--gold); }
        .staff-avatar img { width:100%; height:100%; object-fit:cover; }
        .staff-avatar .initial { font-size:28px; font-family:'Acme',sans-serif; color:var(--background-color); }
        .staff-info { flex:1; }
        .staff-info h5 { color:var(--background-color); font-family:'Acme',sans-serif; margin-bottom:4px; font-size:17px; }
        .staff-info .designation { color:var(--green); font-weight:600; font-size:13px; margin-bottom:8px; }
        .staff-info .staff-details { font-size:13px; color:#666; }
        .staff-info .staff-details span { display:inline-block; margin-right:15px; margin-bottom:4px; }
        .staff-info .staff-details i { color:var(--gold); margin-right:5px; min-width:14px; }
        .no-results { text-align:center; padding:60px 20px; background:#fff; border-radius:12px; box-shadow:0 4px 20px rgba(0,0,0,0.08); }
        .no-results i { font-size:60px; color:#ddd; margin-bottom:15px; }
        .no-results h4 { color:#999; }
        .initial-state { text-align:center; padding:60px 20px; background:#fff; border-radius:12px; box-shadow:0 4px 20px rgba(0,0,0,0.08); }
        .initial-state i { font-size:60px; color:var(--gold); margin-bottom:15px; opacity:0.5; }
        @media only screen and (max-width:768px) {
            .staff-section .head_item3 span { font-size:18px; padding:10px 25px; }
            .staff-section{padding:30px 0;}
            .search-card{padding:20px;}
            .search-input-group { flex-direction:column; }
            .search-modes .mode-btn{font-size:13px;padding:8px;}
        }
        @media only screen and (max-width:576px) {
            .staff-section .head_item3 span { font-size:15px; padding:8px 18px; }
            .staff-card { flex-direction:column; text-align:center; padding:15px; }
            .staff-info .staff-details span { display:block; margin-right:0; }
            .staff-info h5{font-size:16px;}
            .search-modes .mode-btn{font-size:12px;padding:8px 6px;}
        }
    </style>
</head>
<body>
    <div id="main-content">
        <section class="page-hero">
            <div class="container">
                <h1><i class="fa fa-users"></i> Search Member</h1>
                <p>Find our gaushala members at श्री प्रेमानंद गोशाला</p>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="index.html"><i class="fa fa-home"></i> Home</a></li>
                        <li class="breadcrumb-item active" aria-current="page">Search Member</li>
                    </ol>
                </nav>
            </div>
        </section>
        <section class="staff-section">
            <div class="container">
                <div class="head_item3" data-aos="fade-down"><span><i class="fa fa-users"></i> Find Members</span></div>
                <div class="row justify-content-center">
                    <div class="col-lg-8" data-aos="fade-up">
                        <div class="search-card">
                            <h4><i class="fa fa-search"></i> Search Member</h4>
                            <div class="search-modes">
                                <button class="mode-btn active" data-mode="name" onclick="switchMode('name')"><i class="fa fa-user"></i> Search by Name</button>
                                <button class="mode-btn" data-mode="address" onclick="switchMode('address')"><i class="fa fa-map-marker"></i> Search by Address</button>
                            </div>
                            <div class="search-input-group">
                                <input type="text" class="form-control" id="searchInput" placeholder="Enter name to search members...">
                                <button class="search-btn" onclick="searchMembers()"><i class="fa fa-search"></i> Search</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="resultsCount" class="results-count text-center" style="display:none;"></div>
                <div id="resultsContainer">
                    <div class="initial-state" data-aos="fade-up">
                        <i class="fa fa-search"></i>
                        <h4>Search for Members</h4>
                        <p style="color:#999;">Enter a name or address to find our gaushala members.</p>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.5.3/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/owl.carousel.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/app.js"></script>
    <script src="js/shared.js"></script>
    <script>
        var currentMode = 'name';
        function switchMode(mode) {
            currentMode = mode;
            $('.mode-btn').removeClass('active');
            $('.mode-btn[data-mode="' + mode + '"]').addClass('active');
            $('#searchInput').attr('placeholder', mode === 'name' ? 'Enter name to search members...' : 'Enter address to search members...');
            $('#searchInput').focus();
        }
        function searchMembers() {
            var query = $('#searchInput').val().trim();
            if (!query) {
                $('#resultsContainer').html('<div class="no-results"><i class="fa fa-exclamation-circle"></i><h4>Please enter a search term</h4></div>');
                $('#resultsCount').hide();
                return;
            }
            $('#resultsContainer').html('<div class="text-center py-5"><i class="fa fa-spinner fa-spin fa-3x" style="color:var(--gold);"></i><p class="mt-3">Searching members...</p></div>');
            $('#resultsCount').hide();
            var param = currentMode === 'name' ? 'name' : 'address';
            var url = '/api/members/search?' + encodeURIComponent(param) + '=' + encodeURIComponent(query);
            $.get(url, function(members) {
                if (!members || members.length === 0) {
                    $('#resultsContainer').html('<div class="no-results"><i class="fa fa-user-times"></i><h4>No members found</h4><p style="color:#999;">No members match your search for "<strong>' + query + '</strong>".</p></div>');
                    $('#resultsCount').hide();
                    return;
                }
                $('#resultsCount').html('Found <strong>' + members.length + '</strong> member' + (members.length > 1 ? 's' : '') + ' for "<strong>' + query + '</strong>"').show();
                var html = '<div class="row">';
                members.forEach(function(m, i) {
                    var avatarHtml = m.photo ? '<img src="/uploads/' + m.photo + '" alt="' + (m.name || '') + '">' : '<span class="initial">' + (m.name ? m.name.charAt(0).toUpperCase() : '?') + '</span>';
                    var statusClass = (m.status || 'approved').toLowerCase();
                    var statusLabel = statusClass.charAt(0).toUpperCase() + statusClass.slice(1);
                    html += '<div class="col-lg-6">';
                    html += '<div class="staff-card"><div class="staff-avatar">' + avatarHtml + '</div>';
                    html += '<div class="staff-info"><h5>' + (m.name || 'Unknown') + '</h5>';
                    html += '<div class="member-status ' + statusClass + '">' + statusLabel + '</div>';
                    if (m.id_card_number) html += '<div class="designation"><i class="fa fa-id-card"></i> ID: ' + m.id_card_number + '</div>';
                    html += '<div class="staff-details">';
                    if (m.phone) html += '<span><i class="fa fa-phone"></i> ' + m.phone + '</span>';
                    if (m.email) html += '<span><i class="fa fa-envelope"></i> ' + m.email + '</span>';
                    if (m.address) html += '<span><i class="fa fa-map-marker"></i> ' + m.address + '</span>';
                    html += '</div>';
                    if (m.valid_from) {
                        html += '<div class="validity-text"><i class="fa fa-calendar"></i> Joined: ' + m.valid_from;
                        if (m.valid_till) html += ' | Valid till: ' + m.valid_till;
                        html += '</div>';
                    }
                    html += '</div></div></div>';
                });
                html += '</div>';
                $('#resultsContainer').html(html);
                AOS.refresh();
            }).fail(function() {
                $('#resultsContainer').html('<div class="no-results"><i class="fa fa-exclamation-triangle" style="color:var(--gold);"></i><h4>Search failed</h4></div>');
            });
        }
        $('#searchInput').on('keypress', function(e) { if (e.which === 13) searchMembers(); });
    </script>
</body>
</html>
