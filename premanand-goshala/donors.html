<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List of Donors - श्री प्रेमानंद गौशाला</title>
    <link rel="icon" type="image/png" href="icon/favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.5.3/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bree+Serif&family=Acme&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.carousel.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.theme.default.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
    <link rel="stylesheet" href="css/shared.css">
    <style>
        .donors-section { padding:60px 0; }
        .donors-section .head_item3 { width:100%; text-align:center; margin:0 0 40px; display:flex; align-items:center; justify-content:center; }
        .donors-section .head_item3 span { background:var(--green); color:#fff; padding:12px 40px; border-radius:8px; font-size:24px; font-weight:bold; display:inline-block; text-transform:uppercase; box-shadow:0 4px 15px rgba(46,139,87,0.3); }
        .donor-card { background:#fff; border-radius:12px; padding:20px; box-shadow:0 4px 20px rgba(0,0,0,0.08); margin-bottom:15px; transition:0.3s; display:flex; align-items:center; gap:15px; }
        .donor-card:hover { transform:translateX(5px); box-shadow:0 8px 30px rgba(139,69,19,0.15); }
        .donor-card .donor-avatar { width:50px; height:50px; border-radius:50%; background:var(--light-bg); display:flex; align-items:center; justify-content:center; font-size:22px; color:var(--background-color); flex-shrink:0; }
        .donor-card .donor-info { flex:1; }
        .donor-card .donor-info h6 { color:var(--background-color); font-family:'Acme',sans-serif; margin-bottom:2px; }
        .donor-card .donor-info small { color:#999; font-size:12px; }
        .donor-card .donor-amount { background:var(--green); color:#fff; padding:8px 18px; border-radius:50px; font-weight:600; font-size:15px; white-space:nowrap; }
        .no-donors { text-align:center; padding:60px 20px; background:#fff; border-radius:12px; box-shadow:0 4px 20px rgba(0,0,0,0.08); }
        .no-donors i { font-size:60px; color:#ddd; margin-bottom:15px; }
        .no-donors h4 { color:#999; }
        @media only screen and (max-width:768px) {
            .donors-section .head_item3 span { font-size:18px; padding:10px 25px; }
            .donors-section{padding:30px 0;}
            .donor-card { flex-wrap:wrap; padding:15px; }
            .donor-card .donor-amount { width:100%; text-align:center; margin-top:5px; }
        }
        @media only screen and (max-width:576px) {
            .donors-section .head_item3 span { font-size:15px; padding:8px 18px; }
            .donor-card { gap:10px; }
            .donor-card .donor-avatar { width:40px; height:40px; font-size:18px; }
        }
    </style>
</head>
<body>
    <div id="main-content">
        <section class="page-hero">
            <div class="container">
                <h1><i class="fa fa-list"></i> List of Donors</h1>
                <p>Our generous supporters who help us serve गौ माता</p>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="index.html"><i class="fa fa-home"></i> Home</a></li>
                        <li class="breadcrumb-item active" aria-current="page">List of Donors</li>
                    </ol>
                </nav>
            </div>
        </section>
        <section class="donors-section">
            <div class="container">
                <div class="head_item3" data-aos="fade-down"><span><i class="fa fa-list"></i> Our Donors</span></div>
                <div id="donorsContainer">
                    <div class="text-center py-5"><i class="fa fa-spinner fa-spin fa-3x" style="color:var(--gold);"></i><p class="mt-3">Loading donors...</p></div>
                </div>
            </div>
        </section>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.5.3/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/owl.carousel.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/app.js"></script>
    <script src="js/shared.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() { loadDonors(); });
        function loadDonors() {
            var container = document.getElementById('donorsContainer');
            fetch('/api/donations/public')
                .then(function(res) { return res.json(); })
                .then(function(donations) {
                    container.innerHTML = '';
                    if (!donations || donations.length === 0) {
                        container.innerHTML = '<div class="no-donors"><i class="fa fa-gift"></i><h4>No donations yet</h4><p style="color:#999;">Be the first to donate and support गौ सेवा!</p><a href="donation_form.html" class="btn mt-3" style="background:var(--gold);color:#fff;border-radius:50px;padding:10px 30px;"><i class="fa fa-heart"></i> Donate Now</a></div>';
                        return;
                    }
                    var html = '<div class="row">';
                    donations.forEach(function(d) {
                        var initial = d.donor_name ? d.donor_name.charAt(0).toUpperCase() : '?';
                        var date = d.created_at ? new Date(d.created_at).toLocaleDateString('en-IN') : '';
                        var amount = '\u20B9' + (parseFloat(d.amount) || 0).toLocaleString('en-IN');
                        var addr = d.address || '';
                        var parts = addr.split(',').map(function(p){ return p.trim(); });
                        var basicAddr = parts.length > 1 ? parts.slice(-2).join(', ') : addr;
                        html += '<div class="col-lg-6">' +
                            '<div class="donor-card">' +
                            '<div class="donor-avatar">' + initial + '</div>' +
                            '<div class="donor-info"><h6>' + d.donor_name + '</h6>' +
                            '<small><i class="fa fa-map-marker"></i> ' + basicAddr + '</small><br>' +
                            '<small><i class="fa fa-calendar"></i> ' + date + '</small></div>' +
                            '<div class="donor-amount">' + amount + '</div></div></div>';
                    });
                    html += '</div>';
                    container.innerHTML = html;
                })
                .catch(function(err) {
                    container.innerHTML = '<div class="no-donors"><i class="fa fa-exclamation-triangle" style="color:var(--gold);"></i><h4>Could not load donors</h4><p>' + err.message + '</p></div>';
                });
        }
    </script>
</body>
</html>
