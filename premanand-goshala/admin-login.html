<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - श्री प्रेमानंद गौशाला</title>
    <link rel="icon" type="image/png" href="icon/favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.5.3/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bree+Serif&family=Acme&display=swap">
    <style>
        :root { --bg: #8B4513; --gold: #D4A017; --green: #2E8B57; --light: #FFF8F0; }
        * { padding:0; margin:0; box-sizing:border-box; }
        body { font-family:'Bree Serif',serif; background:var(--light); min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .login-wrapper { width:100%; max-width:420px; padding:20px; }
        .login-card { background:#fff; border-radius:16px; padding:40px 35px; box-shadow:0 10px 40px rgba(0,0,0,0.1); text-align:center; }
        .login-card .logo { height:70px; margin-bottom:12px; }
        .login-card h4 { color:var(--bg); font-family:'Acme',sans-serif; }
        .login-card p { color:#999; font-size:14px; margin-bottom:25px; }
        .login-card .form-control { border:2px solid #e0d6cc; border-radius:50px; padding:12px 20px; font-size:15px; transition:0.3s; }
        .login-card .form-control:focus { border-color:var(--bg); box-shadow:0 0 0 3px rgba(139,69,19,0.1); }
        .login-card .btn-login { background:var(--bg); color:#fff; border-radius:50px; padding:12px; font-weight:600; border:none; cursor:pointer; transition:0.3s; width:100%; font-size:16px; }
        .login-card .btn-login:hover { background:var(--gold); }
        .login-card .input-group-text { background:#fff; border:2px solid #e0d6cc; border-right:none; border-radius:50px 0 0 50px; color:#999; }
        .login-card .input-group .form-control { border-left:none; }
        .login-card .alert { border-radius:12px; font-size:14px; }
        .login-footer { margin-top:20px; font-size:13px; color:#999; }
        .login-footer a { color:var(--bg); text-decoration:none; }
        .login-footer a:hover { color:var(--gold); }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <img src="images/logo.jpg" alt="Logo" class="logo">
            <h4>श्री प्रेमानंद गौशाला</h4>
            <p>Admin Panel Login</p>
            <div id="loginMsg"></div>
            <form id="loginForm">
                <div class="form-group">
                    <div class="input-group">
                        <div class="input-group-prepend"><span class="input-group-text"><i class="fa fa-envelope"></i></span></div>
                        <input type="email" name="email" class="form-control" placeholder="Email address" required autofocus>
                    </div>
                </div>
                <div class="form-group">
                    <div class="input-group">
                        <div class="input-group-prepend"><span class="input-group-text"><i class="fa fa-lock"></i></span></div>
                        <input type="password" name="password" class="form-control" placeholder="Password" required>
                    </div>
                </div>
                <button type="submit" class="btn-login"><i class="fa fa-sign-in"></i> Login</button>
            </form>
            <div class="login-footer">
                <a href="index.html"><i class="fa fa-home"></i> Back to Home</a>
            </div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <script>
        var token = localStorage.getItem('admin_token');
        if (token) { window.location.href = 'admin-dashboard.html'; }

        $('#loginForm').on('submit', function(e) {
            e.preventDefault();
            var btn = $(this).find('button[type="submit"]');
            btn.prop('disabled', true).html('<i class="fa fa-spinner fa-spin"></i> Logging in...');
            $.post('/api/auth/login', $(this).serialize())
                .done(function(res) {
                    localStorage.setItem('admin_token', res.token);
                    localStorage.setItem('admin_user', JSON.stringify(res.user));
                    $('#loginMsg').html('<div class="alert alert-success">Login successful! Redirecting...</div>');
                    setTimeout(function() { window.location.href = 'admin-dashboard.html'; }, 800);
                })
                .fail(function(xhr) {
                    var msg = xhr.responseJSON?.error || 'Login failed. Try again.';
                    $('#loginMsg').html('<div class="alert alert-danger">' + msg + '</div>');
                    btn.prop('disabled', false).html('<i class="fa fa-sign-in"></i> Login');
                });
        });
    </script>
</body>
</html>
