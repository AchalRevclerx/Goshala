<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Card - श्री प्रेमानंद गोशाला</title>
    <link rel="icon" type="image/png" href="icon/favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.5.3/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bree+Serif&family=Acme&display=swap">
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
    <link rel="stylesheet" href="css/shared.css">
    <style>
        .page-hero{background:linear-gradient(rgba(139,69,19,0.85),rgba(139,69,19,0.85));}
        .idcard-section{padding:60px 0;}
        .idcard-section .head_item3{width:100%;text-align:center;margin:0 0 40px;display:flex;align-items:center;justify-content:center;}
        .idcard-section .head_item3 span{background:var(--background-color);color:#fff;padding:12px 40px;border-radius:8px;font-size:24px;font-weight:bold;display:inline-block;text-transform:uppercase;box-shadow:0 4px 15px rgba(139,69,19,0.3);}
        .idcard-search-box{background:#fff;border-radius:12px;padding:30px;box-shadow:0 4px 20px rgba(0,0,0,0.08);margin-bottom:40px;}
        .idcard-search-box h4{color:var(--background-color);font-family:'Acme',serif;margin-bottom:20px;border-bottom:2px solid var(--gold);padding-bottom:10px;}
        .idcard-search-box .form-control{border-radius:8px;border:1px solid #ddd;padding:10px 15px;font-size:14px;font-family:'Bree Serif',serif;}
        .idcard-search-box .form-control:focus{border-color:var(--gold);box-shadow:0 0 0 0.2rem rgba(212,160,23,0.25);}
        .idcard-search-box .search-btn{background:var(--background-color);color:#fff;padding:10px 30px;border:none;border-radius:50px;font-size:14px;font-weight:600;cursor:pointer;transition:0.3s;font-family:'Bree Serif',serif;}
        .idcard-search-box .search-btn:hover{background:var(--gold);}

        .idcard-preview{display:flex;justify-content:center;margin-top:30px;}
        .idcard{width:340px;border-radius:16px;overflow:hidden;box-shadow:0 8px 30px rgba(0,0,0,0.2);font-family:'Bree Serif',serif;}
        .idcard-top{background:linear-gradient(135deg,var(--background-color),#5a3e1b);padding:20px;text-align:center;color:#fff;}
        .idcard-top img{width:70px;height:70px;border-radius:50%;border:3px solid var(--gold);margin-bottom:8px;}
        .idcard-top h5{margin:0;font-size:16px;font-family:'Acme',serif;}
        .idcard-top p{margin:2px 0 0;font-size:11px;opacity:0.85;}
        .idcard-middle{padding:15px 20px;background:#fff;}
        .idcard-middle .detail-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0f0f0;font-size:13px;}
        .idcard-middle .detail-row:last-child{border-bottom:none;}
        .idcard-middle .detail-row .label{color:#888;font-weight:600;}
        .idcard-middle .detail-row .value{color:var(--background-color);font-weight:700;}
        .idcard-validity{padding:8px 20px;background:var(--light-bg);text-align:center;font-size:11px;color:#666;}
        .idcard-footer-bar{background:linear-gradient(135deg,var(--background-color),#5a3e1b);padding:10px;text-align:center;color:#fff;font-size:11px;}
        .member-status{text-align:center;margin-top:20px;font-size:14px;}
        .member-status .badge{padding:8px 20px;border-radius:20px;font-size:13px;}
        .btn-download{background:var(--background-color);color:#fff;padding:10px 30px;border:none;border-radius:50px;font-size:14px;font-weight:600;cursor:pointer;transition:0.3s;margin-top:15px;font-family:'Bree Serif',serif;}
        .btn-download:hover{background:var(--gold);}
        .no-member{text-align:center;padding:40px;color:#888;}
        .no-member i{font-size:60px;color:var(--gold);margin-bottom:15px;}
        .not-approved{text-align:center;padding:30px;background:#fff3cd;border-radius:12px;border:1px solid #ffc107;}
        .not-approved i{font-size:40px;color:#856404;margin-bottom:10px;}
        .not-approved h5{color:#856404;font-family:'Acme',serif;}
        @media only screen and (max-width:768px){
            .idcard-section .head_item3 span{font-size:18px;padding:10px 25px;}
            .idcard{width:300px;}
        }
    </style>
</head>
<body>

    <div id="main-content">
        <section class="page-hero">
            <div class="container">
                <h1><i class="fa fa-id-card"></i> ID Card</h1>
                <p>Search and Download Your Member ID Card</p>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="index.html"><i class="fa fa-home"></i> Home</a></li>
                        <li class="breadcrumb-item active" aria-current="page">ID Card</li>
                    </ol>
                </nav>
            </div>
        </section>

        <section class="idcard-section">
            <div class="container">
                <div class="head_item3" data-aos="fade-down">
                    <span><i class="fa fa-id-card"></i> Member ID Card</span>
                </div>

                <div class="idcard-search-box" data-aos="fade-up">
                    <h4><i class="fa fa-search"></i> Search Your ID Card</h4>
                    <form id="searchForm">
                        <div class="form-row align-items-end">
                            <div class="form-group col-md-8">
                                <label>Mobile Number</label>
                                <input type="tel" id="searchMobile" class="form-control" placeholder="Enter your registered mobile number" required>
                            </div>
                            <div class="form-group col-md-4">
                                <button type="submit" class="search-btn"><i class="fa fa-search"></i> Search</button>
                            </div>
                        </div>
                    </form>
                </div>

                <div id="cardResult" data-aos="fade-up"></div>
            </div>
        </section>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.5.3/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/app.js"></script>
    <script src="js/shared.js"></script>
    <script>
        function searchMember(mobile) {
            $('#cardResult').html('<div class="text-center"><i class="fa fa-spinner fa-spin" style="font-size:40px;color:var(--gold);"></i><p class="mt-2">Searching...</p></div>');
            $.get('/api/members/search?mobile=' + mobile, function(data) {
                if (data.status === 'approved') {
                    var validity = 'Valid till ' + data.validTill;
                    var cardHtml = '<div class="idcard-preview">' +
                        '<div class="idcard" id="idCard">' +
                        '<div class="idcard-top">' +
                        '<img src="' + (data.photo || 'icon/favicon.png') + '" alt="Photo">' +
                        '<h5>श्री प्रेमानंद गोशाला</h5>' +
                        '<p>Shri Premand Gaushala, Mathura</p>' +
                        '</div>' +
                        '<div class="idcard-middle">' +
                        '<div class="detail-row"><span class="label">Name</span><span class="value">' + data.name + '</span></div>' +
                        '<div class="detail-row"><span class="label">Mobile</span><span class="value">' + data.mobile + '</span></div>' +
                        '<div class="detail-row"><span class="label">Member ID</span><span class="value">' + data.memberId + '</span></div>' +
                        '<div class="detail-row"><span class="label">Join Date</span><span class="value">' + data.joinDate + '</span></div>' +
                        '</div>' +
                        '<div class="idcard-validity">' + validity + '</div>' +
                        '<div class="idcard-footer-bar">Jai Gaumata!</div>' +
                        '</div></div>' +
                        '<div class="text-center"><button class="btn-download" onclick="downloadIDCard()"><i class="fa fa-download"></i> Download ID Card</button></div>';
                    $('#cardResult').html(cardHtml);
                } else if (data.status === 'pending') {
                    $('#cardResult').html('<div class="not-approved"><i class="fa fa-clock-o"></i><h5>Application Pending</h5><p>Your application is under review. Please check back later.</p></div>');
                } else if (data.status === 'rejected') {
                    $('#cardResult').html('<div class="not-approved" style="background:#f8d7da;border-color:#f5c6cb;"><i class="fa fa-times-circle" style="color:#721c24;"></i><h5 style="color:#721c24;">Application Rejected</h5><p>Your application has been rejected. Please contact the office.</p></div>');
                } else {
                    $('#cardResult').html('<div class="no-member"><i class="fa fa-user-times"></i><h5>No Member Found</h5><p>No member found with this mobile number. Please register first.</p></div>');
                }
            }).fail(function() {
                $('#cardResult').html('<div class="no-member"><i class="fa fa-exclamation-triangle"></i><h5>Error</h5><p>Something went wrong. Please try again.</p></div>');
            });
        }

        function downloadIDCard() {
            var card = document.getElementById('idCard');
            html2canvas(card, { scale: 2, useCORS: true }).then(function(canvas) {
                var link = document.createElement('a');
                link.download = 'gaushala-id-card.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }

        $('#searchForm').on('submit', function(e) {
            e.preventDefault();
            searchMember($('#searchMobile').val().trim());
        });
    </script>
</body>
</html>
