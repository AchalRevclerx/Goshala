<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Donation Receipts - श्री प्रेमानंद गोशाला</title>
    <link rel="icon" type="image/png" href="icon/favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.5.3/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bree+Serif&family=Acme&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.carousel.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.theme.default.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
    <link rel="stylesheet" href="css/shared.css">
    <style>
        .receipts-section { padding:60px 0; }
        .receipts-section .head_item3 { width:100%; text-align:center; margin:0 0 40px; display:flex; align-items:center; justify-content:center; }
        .receipts-section .head_item3 span { background:var(--green); color:#fff; padding:12px 40px; border-radius:8px; font-size:24px; font-weight:bold; display:inline-block; text-transform:uppercase; box-shadow:0 4px 15px rgba(46,139,87,0.3); }
        .receipts-table-wrap { background:#fff; border-radius:12px; overflow:hidden; box-shadow:0 4px 20px rgba(0,0,0,0.08); }
        .receipts-table-wrap table { margin:0; font-size:14px; }
        .receipts-table-wrap th { background:var(--background-color); color:#fff; font-weight:600; border:none; padding:12px 15px; }
        .receipts-table-wrap td { padding:12px 15px; vertical-align:middle; }
        .receipts-table-wrap tr:hover { background:var(--light-bg); }
        .badge-pending { background:#ffc107; color:#333; padding:4px 12px; border-radius:50px; font-size:12px; font-weight:600; }
        .badge-completed { background:var(--green); color:#fff; padding:4px 12px; border-radius:50px; font-size:12px; font-weight:600; }
        .badge-rejected { background:#dc3545; color:#fff; padding:4px 12px; border-radius:50px; font-size:12px; font-weight:600; }
        .btn-receipt { background:var(--gold); color:#fff; border:none; padding:6px 16px; border-radius:50px; font-size:13px; cursor:pointer; transition:0.3s; font-family:'Bree Serif',serif; }
        .btn-receipt:hover { background:var(--background-color); color:#fff; transform:scale(1.05); }
        .no-receipts { text-align:center; padding:60px 20px; background:#fff; border-radius:12px; box-shadow:0 4px 20px rgba(0,0,0,0.08); }
        .no-receipts i { font-size:60px; color:#ddd; margin-bottom:15px; }
        .no-receipts h4 { color:#999; }
        .receipt-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); backdrop-filter:blur(4px); z-index:99999; align-items:center; justify-content:center; }
        .receipt-overlay.active { display:flex; }
        .receipt-paper { background:#fff; width:700px; max-width:95vw; max-height:90vh; overflow-y:auto; border-radius:12px; box-shadow:0 10px 40px rgba(0,0,0,0.3); padding:0; position:relative; }
        .receipt-paper .receipt-close { position:absolute; top:12px; right:16px; background:none; border:none; font-size:24px; color:#999; cursor:pointer; z-index:10; }
        .receipt-paper .receipt-close:hover { color:red; }
        .receipt-paper .receipt-actions { position:absolute; top:12px; right:50px; z-index:10; }
        .receipt-paper .receipt-actions button { background:var(--green); color:#fff; border:none; padding:6px 18px; border-radius:50px; font-size:13px; cursor:pointer; transition:0.3s; font-family:'Bree Serif',serif; }
        .receipt-paper .receipt-actions button:hover { background:var(--background-color); }
        .receipt-content { padding:40px; }
        .receipt-content .receipt-header { text-align:center; border-bottom:3px double var(--background-color); padding-bottom:20px; margin-bottom:20px; }
        .receipt-content .receipt-header img { height:70px; margin-bottom:10px; }
        .receipt-content .receipt-header h4 { font-family:'Acme',sans-serif; color:var(--background-color); margin-bottom:5px; }
        .receipt-content .receipt-header p { font-size:13px; color:#666; margin:2px 0; }
        .receipt-content .receipt-title { text-align:center; font-family:'Acme',sans-serif; font-size:22px; color:var(--green); margin:20px 0; text-transform:uppercase; border:2px solid var(--green); display:inline-block; padding:8px 30px; border-radius:8px; margin-left:auto; margin-right:auto; width:100%; }
        .receipt-content .receipt-body { margin-top:20px; }
        .receipt-content .receipt-body table { width:100%; font-size:14px; }
        .receipt-content .receipt-body table td { padding:10px 12px; border-bottom:1px solid #eee; }
        .receipt-content .receipt-body table td:first-child { font-weight:600; color:var(--background-color); width:200px; }
        .receipt-content .receipt-thankyou { text-align:center; margin-top:30px; padding:20px; background:var(--light-bg); border-radius:8px; border-left:4px solid var(--gold); }
        .receipt-content .receipt-thankyou p { font-size:15px; color:#555; line-height:1.8; }
        .receipt-content .receipt-thankyou .thankyou-heading { font-family:'Acme',sans-serif; color:var(--background-color); font-size:18px; margin-bottom:10px; }
        .receipt-content .receipt-footer { text-align:center; margin-top:25px; padding-top:15px; border-top:2px dashed #ddd; font-size:12px; color:#999; }
        @media print { body * { visibility:hidden; } .receipt-paper, .receipt-paper * { visibility:visible; } .receipt-paper { position:absolute; left:0; top:0; width:100%; max-width:100%; box-shadow:none; border-radius:0; } .receipt-paper .receipt-close, .receipt-paper .receipt-actions { display:none !important; } }
    </style>
</head>
<body>
    <div id="main-content">
        <section class="page-hero">
            <div class="container">
                <h1><i class="fa fa-file-text-o"></i> My Donation Receipts</h1>
                <p>View and download your donation receipts from श्री प्रेमानंद गोशाला</p>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="index.html"><i class="fa fa-home"></i> Home</a></li>
                        <li class="breadcrumb-item active" aria-current="page">Donation Receipts</li>
                    </ol>
                </nav>
            </div>
        </section>
        <section class="receipts-section">
            <div class="container">
                <div class="head_item3" data-aos="fade-down"><span><i class="fa fa-file-text-o"></i> My Donations</span></div>
                <div id="receiptsContainer">
                    <div class="text-center py-5"><i class="fa fa-spinner fa-spin fa-3x" style="color:var(--gold);"></i><p class="mt-3">Loading your donations...</p></div>
                </div>
            </div>
        </section>
    </div>

    <!-- Receipt Print Overlay -->
    <div class="receipt-overlay" id="receiptOverlay">
        <div class="receipt-paper" id="receiptPaper">
            <button class="receipt-close" onclick="closeReceipt()"><i class="fa fa-times"></i></button>
            <div class="receipt-actions"><button onclick="printReceipt()"><i class="fa fa-print"></i> Print Receipt</button></div>
            <div class="receipt-content" id="receiptContent"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.5.3/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/owl.carousel.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/app.js"></script>
    <script src="js/shared.js"></script>
    <script>
        function getToken() { return localStorage.getItem('admin_token'); }
        function authHeaders() { return { 'Authorization': 'Bearer ' + getToken() }; }
        var user = JSON.parse(localStorage.getItem('admin_user') || '{}');
        if (!getToken()) { window.location.href = 'admin-login.html'; }

        $(function() { loadReceipts(); });

        function loadReceipts() {
            $.ajax({ url: '/api/donations/my', headers: authHeaders() })
                .done(function(donations) {
                    var container = $('#receiptsContainer');
                    if (!donations || donations.length === 0) {
                        container.html('<div class="no-receipts"><i class="fa fa-file-text-o"></i><h4>No donations found</h4><p style="color:#999;">You have not made any donations yet.</p><a href="donation_form.html" class="btn mt-3" style="background:var(--gold);color:#fff;border-radius:50px;padding:10px 30px;"><i class="fa fa-heart"></i> Donate Now</a></div>');
                        return;
                    }
                    var html = '<div class="receipts-table-wrap" data-aos="fade-up"><div class="table-responsive"><table class="table table-hover"><thead><tr><th>#</th><th>Donor Name</th><th>Amount</th><th>Payment Method</th><th>Status</th><th>Date</th><th>Receipt</th></tr></thead><tbody>';
                    donations.forEach(function(d, i) {
                        var dt = d.created_at ? new Date(d.created_at).toLocaleDateString('en-IN', { year:'numeric', month:'short', day:'numeric' }) : '-';
                        var amount = '\u20B9' + (parseFloat(d.amount) || 0).toLocaleString('en-IN');
                        var status = d.status || 'pending';
                        var badgeClass = 'badge-pending';
                        if (status === 'completed' || status === 'approved') badgeClass = 'badge-completed';
                        else if (status === 'rejected') badgeClass = 'badge-rejected';
                        html += '<tr><td>' + (i + 1) + '</td><td><strong>' + (d.donor_name || '-') + '</strong></td>';
                        html += '<td style="color:var(--green);font-weight:600;">' + amount + '</td>';
                        html += '<td>' + (d.payment_method || '-') + '</td>';
                        html += '<td><span class="' + badgeClass + '">' + status.charAt(0).toUpperCase() + status.slice(1) + '</span></td>';
                        html += '<td>' + dt + '</td>';
                        html += '<td><button class="btn-receipt" onclick="showReceipt(' + i + ')"><i class="fa fa-eye"></i> View Receipt</button></td></tr>';
                    });
                    html += '</tbody></table></div></div>';
                    container.html(html);
                    window._myDonations = donations;
                })
                .fail(function() {
                    $('#receiptsContainer').html('<div class="no-receipts"><i class="fa fa-exclamation-triangle" style="color:var(--gold);"></i><h4>Could not load donations</h4></div>');
                });
        }

        function showReceipt(index) {
            var d = window._myDonations[index];
            if (!d) return;
            var dt = d.created_at ? new Date(d.created_at).toLocaleDateString('en-IN', { year:'numeric', month:'long', day:'numeric' }) : '-';
            var amount = '\u20B9' + (parseFloat(d.amount) || 0).toLocaleString('en-IN');
            var receiptNo = 'REC-' + (d.id || (index + 1));
            var photoHtml = d.photo ? '<tr><td>Photo</td><td><img src="/uploads/' + d.photo + '" style="max-width:80px;border-radius:6px;"></td></tr>' : '';
            var html = '<div class="receipt-header">' +
                '<img src="images/logo.jpg" alt="Logo"><h4>\u0936\u094D\u0930\u0940 \u092A\u094D\u0930\u0947\u092E\u093E\u0928\u0902\u0926 \u0917\u094B\u0936\u093E\u0932\u093E</h4>' +
                '<p>\u0917\u094B\u0936\u093E\u0932\u093E \u0930\u094B\u0921, \u0935\u0943\u0902\u0926\u093E\u0935\u0928, \u091C\u093F\u0932\u093E \u092E\u0925\u0941\u0930\u093E, \u0909\u0924\u094D\u0924\u0930 \u092A\u094D\u0930\u0926\u0947\u0936 - 281121</p>' +
                '<p>CIN: U01620UP2020NPL123456</p>' +
                '<p>Phone: +91-7000000000 | Email: info@premanandgaushala.org</p></div>' +
                '<div class="receipt-title"><i class="fa fa-file-text-o"></i> Donation Receipt</div>' +
                '<div class="receipt-body"><table>' +
                '<tr><td>Receipt No.</td><td><strong>' + receiptNo + '</strong></td></tr>' +
                '<tr><td>Date</td><td>' + dt + '</td></tr>' +
                '<tr><td>Donor Name</td><td>' + (d.donor_name || '-') + '</td></tr>' +
                '<tr><td>Phone</td><td>' + (d.phone || '-') + '</td></tr>' +
                '<tr><td>Email</td><td>' + (d.email || '-') + '</td></tr>' +
                '<tr><td>PAN</td><td>' + (d.pan || '-') + '</td></tr>' +
                '<tr><td>Address</td><td>' + (d.address || '-') + '</td></tr>' +
                '<tr><td>Donation Amount</td><td style="color:var(--green);font-size:18px;font-weight:700;">' + amount + '</td></tr>' +
                '<tr><td>Payment Method</td><td>' + (d.payment_method || '-') + '</td></tr>' +
                '<tr><td>Transaction ID</td><td>' + (d.transaction_id || '-') + '</td></tr>' +
                '<tr><td>Status</td><td>' + (d.status || 'Pending') + '</td></tr>' +
                photoHtml + '</table></div>' +
                '<div class="receipt-thankyou"><p class="thankyou-heading"><i class="fa fa-heart" style="color:var(--gold);"></i> Thank You!</p>' +
                '<p>Your generous donation to \u0936\u094D\u0930\u0940 \u092A\u094D\u0930\u0947\u092E\u093E\u0928\u0902\u0926 \u0917\u094B\u0936\u093E\u0932\u093E is greatly appreciated. This receipt can be used for tax exemption purposes under Section 80G of the Income Tax Act, 1961.</p></div>' +
                '<div class="receipt-footer"><p>This is a computer-generated receipt and does not require a signature.</p><p>\u0936\u094D\u0930\u0940 \u092A\u094D\u0930\u0947\u092E\u093E\u0928\u0902\u0926 \u0917\u094B\u0936\u093E\u0932\u093E | \u0917\u094C \u0938\u0947\u0935\u093E \u0939\u0940 \u092E\u093E\u0928\u0935 \u0938\u0947\u0935\u093E</p></div>';
            $('#receiptContent').html(html);
            $('#receiptOverlay').addClass('active');
            $('body').css('overflow', 'hidden');
        }
        function closeReceipt() { $('#receiptOverlay').removeClass('active'); $('body').css('overflow', ''); }
        function printReceipt() { window.print(); }
        $('#receiptOverlay').on('click', function(e) { if (e.target === this) closeReceipt(); });
        $(document).on('keydown', function(e) { if (e.key === 'Escape') closeReceipt(); });
    </script>
</body>
</html>
